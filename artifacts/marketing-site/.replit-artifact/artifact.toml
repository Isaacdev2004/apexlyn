kind = "web"
previewPath = "/"
title = "Enterprise SaaS Marketing Website"
version = "1.0.0"
id = "artifacts/marketing-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21209
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/marketing-site run dev"

[services.env]
PORT = "21209"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/marketing-site", "run", "build"]
publicDir = "artifacts/marketing-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
